name: Build and Push AppleIntelTGLLCDDriver.kext

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-14   # pin to older runner for Xcode compatibility
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned kext
        run: |
          xcodebuild -project AppleIntelTGLController.xcodeproj \
                     -scheme AppleIntelTGLController \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
        continue-on-error: true

      - name: Commit built kext
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -r build/Build/Products/Release/AppleIntelTGLController.kext ./AppleIntelTGLController.kext
          git add AppleIntelTGLController.kext
          git commit -m "Add built AppleIntelTGLController.kext"
          git push origin HEAD:main
