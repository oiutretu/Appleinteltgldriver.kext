name: Release AppleIntelTGLLCDDriver.kext (Unsigned)

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: macos-12   # use macOS 12 runner with older Xcode
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned kext
        run: |
          xcodebuild \
            -project AppleIntelTGLController.xcodeproj \
            -scheme AppleIntelTGLController \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify build output
        run: |
          KEXT_PATH="build/Build/Products/Release/AppleIntelTGLController.kext"
          if [ ! -d "$KEXT_PATH" ]; then
            echo "Error: kext not found at $KEXT_PATH"
            exit 1
          fi
          echo "Build successful: $KEXT_PATH"

      - name: Upload release asset
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            build/Build/Products/Release/AppleIntelTGLController.kext
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
