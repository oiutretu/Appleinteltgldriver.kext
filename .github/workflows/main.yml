name: Build & Release AppleIntelTGLLCDDriver.kext (Unsigned)

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned kext
        run: |
          xcodebuild -project AppleIntelTGLController.xcodeproj \
                     -scheme AppleIntelTGLController \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Package kext
        run: |
          cd build/Build/Products/Release
          zip -r AppleIntelTGLController.zip AppleIntelTGLController.kext

      - name: Upload artifact (for PRs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: AppleIntelTGLController
          path: build/Build/Products/Release/AppleIntelTGLController.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/Build/Products/Release/AppleIntelTGLController.zip
          asset_name: AppleIntelTGLController.zip
          asset_content_type: application/zip
