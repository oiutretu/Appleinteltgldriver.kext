name: Build AppleIntelTGLLCDDriver.kext (Unsigned)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned kext
        run: |
          xcodebuild -project AppleIntelTGLController.xcodeproj \
                     -scheme AppleIntelTGLController \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Zip kext
        run: |
          cd build/Build/Products/Release
          zip -r AppleIntelTGLController.kext.zip AppleIntelTGLController.kext

      - name: Upload zipped kext
        uses: actions/upload-artifact@v4
        with:
          name: AppleIntelTGLController.kext
          path: build/Build/Products/Release/AppleIntelTGLController.kext.zip
