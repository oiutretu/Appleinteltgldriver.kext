name: Release AppleIntelTGLLCDDriver.kext (Unsigned)

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: macos-12   # pin to macOS 12 runner for older Xcode
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned kext
        run: |
          xcodebuild -project AppleIntelTGLController.xcodeproj \
                     -scheme AppleIntelTGLController \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/Build/Products/Release/AppleIntelTGLController.kext
          asset_name: AppleIntelTGLController.kext
          asset_content_type: application/octet-stream
